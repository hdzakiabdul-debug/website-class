<style>
/* ============================================================
   ROOT VARIABLES
   ============================================================ */
:root {
    --accent: #4F6EF7;
    --accent-2: #7C3AED;
    --accent-light: rgba(79,110,247,.1);
    --accent-hover: #3B5BDB;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
    --shadow-md: 0 8px 24px rgba(0,0,0,.1);
    --shadow-lg: 0 16px 48px rgba(0,0,0,.15);
    --tr: .18s ease;
}

[data-theme="light"] {
    --bg: #F4F6FB;
    --bg2: #EBEDF5;
    --surface: #FFFFFF;
    --surface2: #F8F9FC;
    --border: #E4E8F0;
    --text: #111827;
    --text2: #4B5563;
    --text3: #9CA3AF;
    --nav-bg: rgba(255,255,255,.92);
}

[data-theme="dark"] {
    --bg: #0F1117;
    --bg2: #1A1D27;
    --surface: #1E2130;
    --surface2: #252838;
    --border: #2E3248;
    --text: #F1F3F9;
    --text2: #A0A8C0;
    --text3: #6B7399;
    --nav-bg: rgba(30,33,48,.94);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--tr), color var(--tr);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; }
ul { list-style: none; }

/* ============================================================
   REGISTER CONTAINER
   ============================================================ */
.register-container {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    padding: 40px 32px;
    box-shadow: var(--shadow-lg);
    animation: fadeUp .4s ease;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Logo */
.register-logo {
    text-align: center;
    margin-bottom: 28px;
}
.register-logo .brand-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 24px;
    margin-bottom: 10px;
}
.register-logo h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -.02em;
}
.register-logo h1 span { color: var(--accent); }
.register-logo p {
    font-size: 14px;
    color: var(--text3);
    margin-top: 4px;
}

/* Theme Toggle */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    font-size: 16px;
    transition: all var(--tr);
    cursor: pointer;
}
.theme-toggle:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
}

/* Messages */
.message {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
}
.message.error {
    display: block;
    background: #FEF2F2;
    color: #DC2626;
    border: 1px solid #FECACA;
}
.message.success {
    display: block;
    background: #F0FDF4;
    color: #16A34A;
    border: 1px solid #BBF7D0;
}
.message.info {
    display: block;
    background: #EFF6FF;
    color: #2563EB;
    border: 1px solid #BFDBFE;
}
.message i { margin-right: 8px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label {
    display: block;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
}
.form-label .required { color: #DC2626; }
.input-wrap {
    position: relative;
}
.input-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
}
.input-wrap .toggle-pwd {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    transition: color var(--tr);
    background: none;
    border: none;
}
.input-wrap .toggle-pwd:hover { color: var(--text); }
.form-input {
    width: 100%;
    padding: 10px 16px 10px 44px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: all var(--tr);
}
.form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,110,247,.12);
}
.form-input.error { border-color: #DC2626; }
.form-input.success { border-color: #22C55E; }
.form-select {
    width: 100%;
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: all var(--tr);
    appearance: none;
    cursor: pointer;
}
.form-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,110,247,.12);
}
.form-hint {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
}
textarea.form-input {
    padding: 10px 14px;
    resize: vertical;
    min-height: 60px;
}

/* Role Cards */
.role-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
}
.role-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all var(--tr);
    background: var(--surface);
}
.role-card:hover { border-color: var(--text3); transform: translateY(-2px); }
.role-card.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 3px rgba(79,110,247,.1);
}
.role-card .role-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.role-card .role-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
}
.role-card .role-desc {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
}
.role-card .role-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
    margin-top: 4px;
}
.role-badge.owner { background: #FEF3C7; color: #92400E; }
.role-badge.admin { background: #DBEAFE; color: #1E40AF; }
.role-badge.moderator { background: #EDE9FE; color: #4C1D95; }
.role-badge.alumni { background: #D1FAE5; color: #065F46; }
[data-theme="dark"] .role-badge.owner { background: #78350F; color: #FCD34D; }
[data-theme="dark"] .role-badge.admin { background: #1E3A5F; color: #93C5FD; }
[data-theme="dark"] .role-badge.moderator { background: #2D1B69; color: #C4B5FD; }
[data-theme="dark"] .role-badge.alumni { background: #064E3B; color: #6EE7B7; }

/* Buttons */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all var(--tr);
    font-family: inherit;
    width: 100%;
}
.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
}
.btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(79,110,247,.35);
}
.btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.btn-primary .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top: 2px solid #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
}
.btn-primary.loading .spinner { display: inline-block; }
.btn-primary.loading .btn-text { display: none; }
@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Footer */
.register-footer {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text3);
}
.register-footer a {
    color: var(--accent);
    font-weight: 600;
}
.register-footer a:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 480px) {
    .register-container { padding: 28px 18px; }
    .register-logo .brand-icon { width: 48px; height: 48px; font-size: 20px; }
    .register-logo h1 { font-size: 19px; }
    .role-selector { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" onclick="toggleTheme()" title="Ganti tema">
    <i id="themeIcon" class="fas fa-moon"></i>
</button>

<!-- ============================================================
   REGISTER FORM
   ============================================================ -->
<div class="register-container">
    <div class="register-logo">
        <div class="brand-icon"><i class="fas fa-user-plus"></i></div>
        <h1>Buat<span>Akun</span></h1>
        <p>Daftar sebagai member Portal Alumni</p>

    <!-- Message -->
    <div class="message" id="message"></div>

    <!-- Form -->
    <form id="registerForm" onsubmit="handleRegister(event)">

        <!-- No HP -->
        <div class="form-group">

            <div class="input-wrap">
                <i class="fab fa-whatsapp"></i>
                <input type="text" id="no_hp" class="form-input" placeholder="0821xxxxx (opsional)"/>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" id="registerBtn">
            <span class="spinner"></span>
            <span class="btn-text"><i class="fas fa-user-plus"></i> Daftar Sekarang</span>
        </button>
    </form>

    <div class="register-footer">
        Sudah punya akun? <a href="login.html">Masuk disini</a>
    </div>
</div>

<!-- ============================================================
   JAVASCRIPT
   ============================================================ -->
<script>
// ============================================================
// 1. SUPABASE INIT
// ============================================================
const SB_URL = 'https://zcmjheeafmtrzyhyhkcg.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjbWpoZWVhZm10cnp5aHloa2NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTY5MDksImV4cCI6MjA5ODE3MjkwOX0.j60lA9VDiTyp42IN8iDsDGu6Qf5EebgYloocFrZqEn4';
const sb = window.supabase.createClient(SB_URL, SB_ANON);

// ============================================================
// 2. STATE
// ============================================================
let selectedRole = 'alumni';
let allKelas = [];

// ============================================================
// 3. THEME
// ============================================================
function isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
}
function toggleTheme() {
    const n = isDark() ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    document.getElementById('themeIcon').className = n === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    localStorage.setItem('pa_theme', n);
}
function initTheme() {
    const s = localStorage.getItem('pa_theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
    document.getElementById('themeIcon').className = s === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

// ============================================================
// 4. TOGGLE PASSWORD
// ============================================================
function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

// ============================================================
// 5. (Role selection dihapus — semua pendaftar publik otomatis
//    menjadi role 'alumni'. Role owner/admin/moderator hanya
//    bisa dibuat oleh Owner lewat Dashboard Owner > Pengguna)
// ============================================================

// ============================================================
// 6. LOAD KELAS
// ============================================================
async function loadKelas() {
    try {
        const { data, error } = await sb
            .from('kelas')
            .select('id, nama_kelas')
            .eq('is_active', true)
            .order('nama_kelas');

        if (error) throw error;
        allKelas = data || [];

        const select = document.getElementById('kelas_id');
        select.innerHTML = `
            <option value="">Pilih Kelas</option>
            ${allKelas.map(k => `
                <option value="${k.id}">${k.nama_kelas}</option>
            `).join('')}
        `;
    } catch (error) {
        console.error('Error loading kelas:', error);
    }
}

// ============================================================
// 7. SHA256
// ============================================================
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// 8. SHOW MESSAGE
// ============================================================
function showMessage(text, type = 'error') {
    const el = document.getElementById('message');
    el.innerHTML = text;
    el.className = `message ${type}`;
}

function hideMessage() {
    document.getElementById('message').className = 'message';
}

// ============================================================
// 9. HANDLE REGISTER
// ============================================================
async function handleRegister(e) {
    e.preventDefault();
    hideMessage();

    const nama = document.getElementById('nama').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim() || null;
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password_confirm').value;
    const role = 'alumni'; // Role pendaftaran publik SELALU alumni — tidak bisa dipilih
    const nis = document.getElementById('nis').value.trim();
    const kelas_id = document.getElementById('kelas_id').value || null;
    const no_hp = document.getElementById('no_hp').value.trim() || null;

    const registerBtn = document.getElementById('registerBtn');

    // ===== VALIDASI =====
    if (!nama) {
        showMessage('Nama lengkap wajib diisi', 'error');
        document.getElementById('nama').focus();
        return;
    }

    if (!username || username.length < 3) {
        showMessage('Username minimal 3 karakter', 'error');
        document.getElementById('username').focus();
        return;
    }

    if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showMessage('Username hanya boleh huruf, angka, dan underscore', 'error');
        document.getElementById('username').focus();
        return;
    }

    if (!password || password.length < 6) {
        showMessage('Password minimal 6 karakter', 'error');
        document.getElementById('password').focus();
        return;
    }

    if (password !== passwordConfirm) {
        showMessage('Password dan konfirmasi tidak cocok', 'error');
        document.getElementById('password_confirm').focus();
        return;
    }

    if (!nis) {
        showMessage('NIS wajib diisi', 'error');
        document.getElementById('nis').focus();
        return;
    }

    // ===== CEK USERNAME UNIK =====
    try {
        const { data: existing } = await sb
            .from('pengguna')
            .select('username')
            .eq('username', username)
            .maybeSingle();

        if (existing) {
            showMessage('Username sudah digunakan. Pilih username lain.', 'error');
            document.getElementById('username').focus();
            return;
        }
    } catch (e) {}

    // ===== PROSES REGISTRASI =====
    registerBtn.classList.add('loading');
    registerBtn.disabled = true;

    try {
        const hashedPassword = await sha256(password);

        const dataPengguna = {
            username: username,
            password: hashedPassword,
            nama: nama,
            role: role, // selalu 'alumni' — tidak bisa diubah dari form publik
            email: email,
            no_hp: no_hp,
            is_active: true,
            created_at: new Date().toISOString()
        };

        const { data, error } = await sb
            .from('pengguna')
            .insert([dataPengguna])
            .select();

        if (error) {
            console.error('Supabase error:', error);
            if (error.code === '23505') {
                showMessage('Username sudah digunakan. Pilih username lain.', 'error');
            } else {
                showMessage('Gagal mendaftar: ' + error.message, 'error');
            }
            return;
        }

        // Setiap pendaftar publik otomatis dibuatkan record alumni
        if (data && data.length > 0) {
            const userId = data[0].id;
            const alumniData = {
                pengguna_id: userId,
                nis: nis,
                nama_lengkap: nama,
                kelas_id: kelas_id,
                email: email || null,
                no_telepon: no_hp || null,
                status: 'active'
            };

            const { error: alumniError } = await sb
                .from('alumni')
                .insert([alumniData]);

            if (alumniError) {
                console.error('Error creating alumni record:', alumniError);
            }
        }

        // Log activity
        await sb.from('activity_log').insert([{
            pengguna_id: data[0].id,
            action: 'register',
            target_type: 'pengguna',
            target_id: data[0].id,
            ip_address: '127.0.0.1',
            user_agent: navigator.userAgent
        }]);

        showMessage(`
            ✅ Pendaftaran berhasil! Selamat datang <strong>${nama}</strong>.
            <br>Silakan <a href="login.html" style="color:var(--accent);font-weight:600;">login</a> untuk melanjutkan.
        `, 'success');

        // Reset form
        document.getElementById('registerForm').reset();

        setTimeout(() => {
            registerBtn.classList.remove('loading');
            registerBtn.disabled = false;
        }, 1000);

    } catch (error) {
        console.error('Register error:', error);
        showMessage('Terjadi kesalahan: ' + error.message, 'error');
        registerBtn.classList.remove('loading');
        registerBtn.disabled = false;
    }
}

// ============================================================
// 10. REAL-TIME VALIDATION
// ============================================================
document.getElementById('username').addEventListener('input', function() {
    const val = this.value;
    const hint = document.getElementById('usernameHint');
    if (val.length >= 3 && /^[a-zA-Z0-9_]+$/.test(val)) {
        hint.style.color = '#22C55E';
        hint.textContent = '✓ Username tersedia';
        this.classList.remove('error');
        this.classList.add('success');
    } else if (val.length > 0) {
        hint.style.color = '#DC2626';
        hint.textContent = '✗ Minimal 3 karakter, huruf/angka/underscore';
        this.classList.remove('success');
        this.classList.add('error');
    } else {
        hint.style.color = '';
        hint.textContent = 'Minimal 3 karakter, huruf/angka/underscore';
        this.classList.remove('error', 'success');
    }
});

document.getElementById('password_confirm').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    if (this.value && this.value === password) {
        this.classList.remove('error');
        this.classList.add('success');
    } else if (this.value) {
        this.classList.remove('success');
        this.classList.add('error');
    } else {
        this.classList.remove('error', 'success');
    }
});

// ============================================================
// 11. CHECK SESSION (Redirect if already logged in)
// ============================================================
function checkSession() {
    try {
        const session = localStorage.getItem('userSession');
        if (session) {
            const user = JSON.parse(session);
            if (user && user.role) {
                const roleMap = {
                    'owner': 'dashboard_owner.html',
                    'admin': 'dashboard_admin.html',
                    'moderator': 'dashboard_moderator.html',
                    'alumni': 'dashboard_alumni.html'
                };
                window.location.href = roleMap[user.role] || 'index.html';
            }
        }
    } catch (e) {}
}

// ============================================================
// 12. INIT
// ============================================================
initTheme();
loadKelas();
checkSession();
</script>
