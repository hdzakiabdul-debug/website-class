<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - Portal Alumni</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<style>
/* ============================================================
   ROOT VARIABLES
   ============================================================ */
:root {
    --accent: #4F6EF7;
    --accent-2: #7C3AED;
    --accent-light: rgba(79,110,247,.1);
    --accent-hover: #3B5BDB;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
    --shadow-md: 0 8px 24px rgba(0,0,0,.1);
    --shadow-lg: 0 16px 48px rgba(0,0,0,.15);
    --tr: .18s ease;
}

[data-theme="light"] {
    --bg: #F4F6FB;
    --bg2: #EBEDF5;
    --surface: #FFFFFF;
    --surface2: #F8F9FC;
    --border: #E4E8F0;
    --text: #111827;
    --text2: #4B5563;
    --text3: #9CA3AF;
    --nav-bg: rgba(255,255,255,.92);
}

[data-theme="dark"] {
    --bg: #0F1117;
    --bg2: #1A1D27;
    --surface: #1E2130;
    --surface2: #252838;
    --border: #2E3248;
    --text: #F1F3F9;
    --text2: #A0A8C0;
    --text3: #6B7399;
    --nav-bg: rgba(30,33,48,.94);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--tr), color var(--tr);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; }
ul { list-style: none; }

/* ============================================================
   LOGIN CONTAINER
   ============================================================ */
.login-container {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    padding: 40px 32px;
    box-shadow: var(--shadow-lg);
    animation: fadeUp .4s ease;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Logo */
.login-logo {
    text-align: center;
    margin-bottom: 32px;
}
.login-logo .brand-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 24px;
    margin-bottom: 12px;
}
.login-logo h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -.02em;
}
.login-logo h1 span { color: var(--accent); }
.login-logo p {
    font-size: 14px;
    color: var(--text3);
    margin-top: 4px;
}

/* Theme Toggle */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    font-size: 16px;
    transition: all var(--tr);
    cursor: pointer;
}
.theme-toggle:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
}

/* Form */
.form-group { margin-bottom: 18px; }
.form-label {
    display: block;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 5px;
}
.form-label .required { color: #DC2626; }
.input-wrap {
    position: relative;
}
.input-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
}
.input-wrap .toggle-pwd {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    transition: color var(--tr);
    background: none;
    border: none;
}
.input-wrap .toggle-pwd:hover { color: var(--text); }
.form-input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: all var(--tr);
}
.form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,110,247,.12);
}
.form-input.error { border-color: #DC2626; }

/* Buttons */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all var(--tr);
    font-family: inherit;
    width: 100%;
}
.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
}
.btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(79,110,247,.35);
}
.btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.btn-primary .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top: 2px solid #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
}
.btn-primary.loading .spinner { display: inline-block; }
.btn-primary.loading .btn-text { display: none; }
@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Messages */
.message {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
}
.message.error {
    display: block;
    background: #FEF2F2;
    color: #DC2626;
    border: 1px solid #FECACA;
}
.message.success {
    display: block;
    background: #F0FDF4;
    color: #16A34A;
    border: 1px solid #BBF7D0;
}
.message.info {
    display: block;
    background: #EFF6FF;
    color: #2563EB;
    border: 1px solid #BFDBFE;
}
.message i { margin-right: 8px; }

/* Footer */
.login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text3);
}
.login-footer a {
    color: var(--accent);
    font-weight: 600;
}
.login-footer a:hover { text-decoration: underline; }
.login-footer .role-list {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
}
.login-footer .role-list .role-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
}
.role-tag.owner { background: #FEF3C7; color: #92400E; }
.role-tag.admin { background: #DBEAFE; color: #1E40AF; }
.role-tag.moderator { background: #EDE9FE; color: #4C1D95; }
.role-tag.alumni { background: #D1FAE5; color: #065F46; }
[data-theme="dark"] .role-tag.owner { background: #78350F; color: #FCD34D; }
[data-theme="dark"] .role-tag.admin { background: #1E3A5F; color: #93C5FD; }
[data-theme="dark"] .role-tag.moderator { background: #2D1B69; color: #C4B5FD; }
[data-theme="dark"] .role-tag.alumni { background: #064E3B; color: #6EE7B7; }

/* Responsive */
@media (max-width: 480px) {
    .login-container { padding: 28px 20px; }
    .login-logo .brand-icon { width: 48px; height: 48px; font-size: 20px; }
    .login-logo h1 { font-size: 19px; }
}
</style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" onclick="toggleTheme()" title="Ganti tema">
    <i id="themeIcon" class="fas fa-moon"></i>
</button>

<!-- ============================================================
   LOGIN FORM
   ============================================================ -->
<div class="login-container">
    <div class="login-logo">
        <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
        <h1>Portal<span>Alumni</span></h1>
        <p>Masuk ke dashboard Anda</p>
    </div>

    <!-- Message -->
    <div class="message" id="message"></div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrap">
                <i class="fas fa-user"></i>
                <input 
                    type="text" 
                    id="username" 
                    class="form-input" 
                    placeholder="Masukkan username"
                    required
                    autocomplete="username"
                />
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Masukkan password"
                    required
                    autocomplete="current-password"
                />
                <button type="button" class="toggle-pwd" onclick="togglePassword()">
                    <i id="pwdIcon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
            <span class="spinner"></span>
            <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Masuk</span>
        </button>
    </form>

    <div class="login-footer">
        <p style="color:var(--text3);font-size:13px;">Hubungi Owner untuk mendapatkan akun.</p>
        <div class="role-list">
            <span class="role-tag owner">👑 Owner</span>
            <span class="role-tag admin">🛡️ Admin</span>
            <span class="role-tag moderator">⚡ Moderator</span>
            <span class="role-tag alumni">🎓 Alumni</span>
        </div>
        <p style="margin-top:8px;font-size:12px;color:var(--text3)">
            Default: <strong>admin</strong> / <strong>admin123</strong>
        </p>
    </div>
</div>

<!-- ============================================================
   JAVASCRIPT
   ============================================================ -->
<script>
// ============================================================
// 1. SUPABASE INIT
// ============================================================
const SB_URL = 'https://zcmjheeafmtrzyhyhkcg.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjbWpoZWVhZm10cnp5aHloa2NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTY5MDksImV4cCI6MjA5ODE3MjkwOX0.j60lA9VDiTyp42IN8iDsDGu6Qf5EebgYloocFrZqEn4';
const sb = window.supabase.createClient(SB_URL, SB_ANON);

// ============================================================
// 2. THEME
// ============================================================
function isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
}
function toggleTheme() {
    const n = isDark() ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    document.getElementById('themeIcon').className = n === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    localStorage.setItem('pa_theme', n);
}
function initTheme() {
    const s = localStorage.getItem('pa_theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
    document.getElementById('themeIcon').className = s === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

// ============================================================
// 3. TOGGLE PASSWORD
// ============================================================
function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('pwdIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        pwd.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

// ============================================================
// 4. SHA256
// ============================================================
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// 5. SHOW MESSAGE
// ============================================================
function showMessage(text, type = 'error') {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = `message ${type}`;
}

function hideMessage() {
    document.getElementById('message').className = 'message';
}

// ============================================================
// 6. HANDLE LOGIN
// ============================================================
async function handleLogin(e) {
    e.preventDefault();
    hideMessage();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');

    if (!username || !password) {
        showMessage('Username dan password wajib diisi', 'error');
        return;
    }

    loginBtn.classList.add('loading');
    loginBtn.disabled = true;

    try {
        const hashedPassword = await sha256(password);

        const { data, error } = await sb
            .from('pengguna')
            .select('*')
            .eq('username', username)
            .eq('password', hashedPassword)
            .maybeSingle();

        if (error) {
            console.error('Error:', error);
            showMessage('Terjadi kesalahan. Silakan coba lagi.', 'error');
            return;
        }

        if (!data) {
            showMessage('Username atau password salah', 'error');
            return;
        }

        if (!data.is_active) {
            showMessage('Akun Anda dinonaktifkan. Hubungi admin.', 'error');
            return;
        }

        if (data.role === 'banned') {
            showMessage('Akun Anda telah dibanned. Hubungi admin.', 'error');
            return;
        }

        // Update last_login
        await sb.from('pengguna')
            .update({ last_login: new Date().toISOString() })
            .eq('id', data.id);

        // Log activity
        await sb.from('activity_log').insert([{
            pengguna_id: data.id,
            action: 'login',
            target_type: 'pengguna',
            target_id: data.id,
            ip_address: '127.0.0.1',
            user_agent: navigator.userAgent
        }]);

        // Save session
        const session = {
            id: data.id,
            username: data.username,
            nama: data.nama,
            role: data.role,
            kelas_id: data.kelas_id,
            loginTime: new Date().toISOString()
        };
        localStorage.setItem('userSession', JSON.stringify(session));

        showMessage('✅ Login berhasil! Mengalihkan...', 'success');

        // Redirect berdasarkan role
        setTimeout(() => {
            const roleMap = {
                'owner': 'dashboard_owner.html',
                'admin': 'dashboard_admin.html',
                'moderator': 'dashboard_moderator.html',
                'alumni': 'dashboard_alumni.html'
            };
            window.location.href = roleMap[data.role] || 'index.html';
        }, 800);

    } catch (error) {
        console.error('Login error:', error);
        showMessage('Terjadi kesalahan: ' + error.message, 'error');
    } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
    }
}

// ============================================================
// 7. CHECK SESSION (Redirect if already logged in)
// ============================================================
function checkSession() {
    try {
        const session = localStorage.getItem('userSession');
        if (session) {
            const user = JSON.parse(session);
            if (user && user.role) {
                const roleMap = {
                    'owner': 'dashboard_owner.html',
                    'admin': 'dashboard_admin.html',
                    'moderator': 'dashboard_moderator.html',
                    'alumni': 'dashboard_alumni.html'
                };
                window.location.href = roleMap[user.role] || 'index.html';
            }
        }
    } catch (e) {
        // No session
    }
}

// ============================================================
// 8. KEYBOARD SUPPORT
// ============================================================
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    }
});

// ============================================================
// 9. INIT
// ============================================================
initTheme();
checkSession();
</script>
</body>
  </html>
